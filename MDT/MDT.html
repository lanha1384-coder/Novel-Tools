<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title data-i18n="mdt.reader">Reader</title>
        <style>
            body.dark {
                background: radial-gradient(
                    circle at top left,
                    #444 0%,
                    #2e2e2e 40%,
                    #1b1b1b 100%
                );
                color: #fff;
            }

            body.dark > #app > details {
                color: #1a1a1a;
            }

            body.dark > #app > summary {
                color: #1a1a1a;
            }

            body.deep {
                background: radial-gradient(
                    circle at top,
                    #1a1a1a 0%,
                    #000 70%
                );
                color: #fff;
            }

            body.deep > #app > details {
                color: #1a1a1a;
            }

            body.deep > #app > summary {
                color: #1a1a1a;
            }

            body.anias {
                background: linear-gradient(
                    135deg,
                    hsl(34, 44%, 75%),
                    hsl(34, 44%, 60%)
                );
                color: #111;
            }

            body.ruby {
                background: linear-gradient(135deg, #18324b, #112435, #0b1722);
                color: #fff;
            }

            body.navajo {
                background: linear-gradient(135deg, #c8ab8f, #ba9c80);
                color: #111;
            }

            body.khaki {
                background: linear-gradient(135deg, #e3e3c1, #d7d7af);
                color: #7b6517;
            }

            body {
                --bg: rgba(255, 255, 255, 0.65);
                --fg: #111;

                background-color: var(--bg);
                color: var(--fg);

                font-family:
                    Inter,
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    sans-serif;

                max-width: 900px;
                margin: auto;
                padding: 24px;

                line-height: 1.8;
                letter-spacing: 0.2px;

                backdrop-filter: blur(20px) saturate(180%);
                -webkit-backdrop-filter: blur(20px) saturate(180%);

                transition:
                    background 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                    color 0.4s cubic-bezier(0.4, 0, 0.2, 1);

                min-height: 100vh;
                background-attachment: fixed;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                z-index: -1;
            }

            ::-webkit-scrollbar {
                width: 10px;
            }

            ::-webkit-scrollbar-track {
                background: transparent;
            }

            ::-webkit-scrollbar-thumb {
                background: rgba(127, 127, 127, 0.35);
                border-radius: 999px;
                border: 2px solid transparent;
                background-clip: padding-box;
                backdrop-filter: blur(12px);
            }

            ::-webkit-scrollbar-thumb:hover {
                background: rgba(127, 127, 127, 0.55);
            }

            ::selection {
                background: rgba(100, 149, 237, 0.25);
            }

            * {
                -webkit-tap-highlight-color: transparent;
                -webkit-font-smoothing: antialiased;
            }

            details {
                margin-bottom: 16px;
                border: 1px solid #ddd;
                border-radius: 6px;
                background: rgb(236, 231, 231);
                padding: 10px 14px;
            }
            summary {
                font-weight: bold;
                cursor: pointer;
                font-size: 1.1em;
                list-style: none;
            }
            details summary:hover {
                opacity: 0.85;
            }
            summary::-webkit-details-marker {
                display: none;
            }
            summary::before {
                content: "▶ ";
            }
            details[open] > summary::before {
                content: "▼ ";
            }
            .content {
                white-space: pre-wrap;
                margin-top: 10px;
                overflow: hidden;
                transition: max-height 0.7s cubic-bezier(0.4, 0, 0.2, 1);
                will-change: max-height;
            }
            details > details {
                margin-top: 12px;
            }

            @media (max-width: 600px) {
                body {
                    padding: 12px;
                    font-size: 17px;
                    line-height: 1.7;
                }
                summary {
                    padding: 10px 0;
                }
                details {
                    padding: 10px 12px;
                }
            }
            @media (hover: none) {
                summary {
                    padding: 12px 0;
                }
            }
            .bullet {
                display: block;
                text-align: center;
                font-size: 1.4em;
                line-height: 1;
                margin: 2px 0;
                padding: 0;
            }
            .empty-text {
                display: block;
                text-align: center;
                opacity: 0.7;
                font-style: italic;
                margin: 4px 0;
                line-height: 1.4;
            }
            .content.empty {
                white-space: normal;
                line-height: 1.4;
            }
            .content.empty .bullet {
                margin: 0;
            }
            .content.empty .empty-text {
                margin: 6px 0;
            }
            .content div:not(:last-child) {
                margin-bottom: 1em;
            }
            #app {
                transition: opacity 1s ease;
            }
            #app.fade-out {
                opacity: 0;
            }
            #app.fade-in {
                opacity: 1;
            }
            .fade-line {
                opacity: 0;
                transform: translateX(80px);
                transition:
                    opacity 1s ease,
                    transform 1s cubic-bezier(0.22, 1, 0.36, 1);
                will-change: transform, opacity;
            }
            .fade-line.show {
                opacity: 1;
                transform: translateX(0);
            }
            .fade-line.exit {
                opacity: 0;
                transform: translateX(-120px);
            }
            .slide-item {
                opacity: 0;
                transform: translateX(120px);
                transition:
                    transform 1s cubic-bezier(0.22, 1, 0.36, 1),
                    opacity 1s ease;
                will-change: transform, opacity;
            }
            .slide-item.show {
                opacity: 1;
                transform: translateX(0);
            }
            .slide-item.exit {
                opacity: 0;
                transform: translateX(-140px);
            }
            .virtual-scroll {
                height: 1000px;
                overflow-y: auto;
                position: relative;
                scrollbar-width: thin;
                scrollbar-gutter: stable;
            }
            .vs-spacer {
                width: 100%;
                height: 0;
            }
            .virtual-scroll::-webkit-scrollbar {
                width: 4px;
                transition: width 0.2s ease;
            }
            .virtual-scroll::-webkit-scrollbar-track {
                background: transparent;
            }
            .virtual-scroll::-webkit-scrollbar-thumb {
                background: rgba(120, 120, 120, 0.25);
                border-radius: 999px;
                transition: background 0.2s ease;
                opacity: 0.3;
            }
            .virtual-scroll:hover::-webkit-scrollbar {
                width: 10px;
            }
            .virtual-scroll:hover::-webkit-scrollbar-thumb {
                background: rgba(120, 120, 120, 0.65);
                opacity: 1;
            }
            .reader-container {
                width: clamp(320px, 90vw, 900px);
                margin: auto;
            }
            .chapter-content {
                font-size: clamp(15px, 1.2vw, 18px);
                line-height: 1.7;
            }
            @media (max-width: 768px) {
                .chapter-content {
                    line-height: 1.8;
                }
            }
            .close-chapter-btn {
                margin: 30px auto 10px;
                display: block;
                padding: 8px 16px;
                border-radius: 8px;
                border: none;
                cursor: pointer;
                background: #444;
                color: #fff;
                transition: 0.2s;
            }
            .close-chapter-btn:hover {
                background: #222;
            }
            .lang-wrapper {
                position: fixed;
                top: 20px;
                right: 20px;

                display: flex;
                flex-direction: column;
                gap: 6px;

                padding: 10px 12px;
                border-radius: 12px;

                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);

                color: white;
                font-family: system-ui, sans-serif;
            }

            .lang-label {
                font-size: 12px;
                opacity: 0.7;
            }

            .lang-select {
                background: rgba(0, 0, 0, 0.4);
                color: white;

                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 8px;

                padding: 6px 10px;

                outline: none;
                cursor: pointer;

                transition: 0.2s;
            }

            .lang-select:hover {
                border-color: rgba(0, 255, 255, 0.5);
                box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            }

            .lang-select option {
                background: #111;
                color: white;
            }
            .chapter-loading {
                display: flex;
                align-items: center;
                justify-content: center;
                height: 120px;
                opacity: 0.8;
                font-size: 14px;
            }

            .chapter-loading::after {
                content: "";
                width: 18px;
                height: 18px;
                margin-left: 10px;
                border: 2px solid currentColor;
                border-right-color: transparent;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .virtual-scroll details[open] > .content {
                max-height: 550px;
                overflow: auto;
            }
        </style>
    </head>
    <body>
        <a
            href="../index.html"
            onclick="sessionStorage.setItem('reloaded_once', '1')"
            style="
                position: fixed;
                top: 15px;
                left: 15px;
                padding: 10px 14px;
                background: rgba(0, 0, 0, 0.6);
                color: white;
                text-decoration: none;
                border-radius: 10px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                backdrop-filter: blur(6px);
                z-index: 9999;
            "
        >
            ⬅ Home
        </a>
        <div class="lang-wrapper">
            <label class="lang-label" data-i18n="lang.option"></label>

            <select onchange="setLang(this.value)">
                <option value="vi-vn">🇻🇳 Tiếng Việt</option>
                <option value="en-us">🇺🇸 English</option>
                <option value="ja-jp">🇯🇵 日本語</option>
                <option value="ko-kr">🇰🇷 한국어</option>
                <option value="zh-cn">🇨🇳 简体中文</option>
                <option value="zh-tw">🇹🇼 繁體中文</option>
                <option value="th-th">🇹🇭 ไทย</option>
                <option value="id-id">🇮🇩 Indonesia</option>
                <option value="de-de">🇩🇪 Deutsch</option>
                <option value="fr-fr">🇫🇷 Français</option>
                <option value="es-es">🇪🇸 Español</option>
                <option value="la">🏛️Latina</option>
            </select>
        </div>
        <h1 style="text-align: center" data-i18n="subtitle.reader"></h1>

        <div id="modes" style="text-align: center; margin-bottom: 16px">
            <label data-i18n="appearance.opt"></label>
            <select id="themeSelect">
                <option value="" data-i18n="appearance.opt.default"></option>
                <option value="ruby" data-i18n="appearance.opt.ruby"></option>
                <option
                    value="navajo"
                    data-i18n="appearance.opt.navajo"
                ></option>
                <option value="khaki" data-i18n="appearance.khaki"></option>
                <option value="dark" data-i18n="appearance.opt.dark"></option>
                <option value="deep" data-i18n="appearance.opt.deep"></option>
                <option value="anias" data-i18n="appearance.opt.anias"></option>
            </select>
        </div>
        <h2 data-i18n="import.txt.notify"></h2>
        <div id="chuy" style="margin: 0px 0; line-height: 1.25">
            <p data-i18n="note.1"></p>
            <p data-i18n="note.2"></p>
            <p data-i18n="note.3"></p>
            <p data-i18n="note.4"></p>
            <p data-i18n="note.5"></p>
        </div>
        <div style="text-align: center; margin-top: 10px">
            <div id="version-switcher">
                <label>
                    <input type="radio" name="ver" onclick="switchApp('md')" />
                    TXT Mode
                </label>

                <label>
                    <input
                        type="radio"
                        name="ver"
                        onclick="switchApp('epub')"
                    />
                    EPUB Mode(Lite Reader)
                </label>
            </div>

            <input type="file" id="file" />
            <button id="clearFile" style="display: none; margin-left: 8px">
                ❌
            </button>
            <div
                id="status"
                style="text-align: center; margin-top: 8px; opacity: 0.8"
            ></div>
        </div>
        <div id="app"></div>
        <noscript>
            <div
                style="text-align: center; color: red; margin: 20px 0"
                data-i18n="noscript.tools"
            ></div>
        </noscript>
        <script src="jszip.min.js"></script>
        <script>
            const APP_MAP = {
                md: "mdtrender.js",
                epub: "epub-reader.js",
            };

            const SCRIPT_ID = "app-script";

            function loadSavedApp() {
                let app = localStorage.getItem("activeApp");

                if (!app) {
                    app = "md";
                    localStorage.setItem("activeApp", app);
                }

                loadApp(app);
            }

            function loadApp(app) {
                const old = document.getElementById(SCRIPT_ID);
                if (old) old.remove();

                const appContainer = document.getElementById("app");
                const status = document.getElementById("status");
                const fileInput = document.getElementById("file");

                if (appContainer) appContainer.innerHTML = "";
                if (status) status.textContent = "";
                if (fileInput) fileInput.value = "";

                const script = document.createElement("script");
                script.id = SCRIPT_ID;
                script.src = APP_MAP[app];

                script.onload = () => {
                    console.log("🚀 Loaded app:", app);
                };

                document.body.appendChild(script);
            }

            function switchApp(app) {
                if (!APP_MAP[app]) return;

                localStorage.setItem("activeApp", app);
                location.reload();
            }

            document.addEventListener("DOMContentLoaded", () => {
                loadSavedApp();
            });
        </script>
        <script src="../i18n-2.js"></script>
        <script src="introscr.js"></script>
        <script src="loadscr.js"></script>
        <script src="themescr.js"></script>
        <script src="bmscr.js"></script>
        <script src="slugcr.js"></script>
        <footer style="text-align: center" data-i18n="footer.mdt"></footer>
    </body>
</html>
