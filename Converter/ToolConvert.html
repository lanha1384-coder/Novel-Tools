<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title data-i18n="converter.title">Converter EPUB ➜ TXT</title>
        <script src="jszip.min.js"></script>
        <style>
            body {
                margin: 0;
                padding: 32px;

                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;

                min-height: 100vh;

                font-family:
                    Inter,
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    sans-serif;

                background: radial-gradient(
                    circle at top left,
                    #2b3560 0%,
                    #141824 40%,
                    #090909 100%
                );

                color: rgba(255, 255, 255, 0.92);

                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
            }

            button {
                padding: 12px 22px;
                margin-top: 12px;

                border: 1px solid rgba(255, 255, 255, 0.12);
                border-radius: 14px;

                background: rgba(255, 255, 255, 0.08);
                color: #fff;

                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);

                cursor: pointer;

                transition:
                    transform 0.2s ease,
                    background 0.2s ease,
                    border-color 0.2s ease,
                    box-shadow 0.2s ease;

                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            }

            button:hover {
                background: rgba(255, 255, 255, 0.14);
                border-color: rgba(255, 255, 255, 0.2);
                transform: translateY(-2px);
            }

            button:active {
                transform: translateY(0);
            }

            textarea {
                width: 100%;
                height: 420px;
                margin-top: 20px;
                padding: 16px;

                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 18px;

                background: rgba(15, 15, 20, 0.75);
                color: #e8e8e8;

                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);

                font-family: "JetBrains Mono", "Cascadia Code", monospace;

                font-size: 14px;
                line-height: 1.7;

                resize: vertical;
                outline: none;

                transition:
                    border-color 0.25s ease,
                    box-shadow 0.25s ease;
            }

            textarea:focus {
                border-color: rgba(99, 102, 241, 0.6);
                box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            }

            textarea::placeholder {
                color: rgba(255, 255, 255, 0.35);
            }

            ::-webkit-scrollbar {
                width: 10px;
            }

            ::-webkit-scrollbar-track {
                background: transparent;
            }

            ::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.18);
                border-radius: 999px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: rgba(255, 255, 255, 0.3);
            }

            ::selection {
                background: rgba(99, 102, 241, 0.3);
            }
            .lang-wrapper {
                position: fixed;
                top: 20px;
                right: 20px;

                display: flex;
                flex-direction: column;
                gap: 6px;

                padding: 10px 12px;
                border-radius: 12px;

                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);

                color: white;
                font-family: system-ui, sans-serif;
            }

            .lang-label {
                font-size: 12px;
                opacity: 0.7;
            }

            .lang-select {
                background: rgba(0, 0, 0, 0.4);
                color: white;

                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 8px;

                padding: 6px 10px;

                outline: none;
                cursor: pointer;

                transition: 0.2s;
            }

            .lang-select:hover {
                border-color: rgba(0, 255, 255, 0.5);
                box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            }

            .lang-select option {
                background: #111;
                color: white;
            }
        </style>
    </head>

    <body>
        <a
            href="../index.html"
            style="
                position: fixed;
                top: 15px;
                left: 15px;
                padding: 10px 14px;
                background: rgba(0, 0, 0, 0.6);
                color: white;
                text-decoration: none;
                border-radius: 10px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                backdrop-filter: blur(6px);
                z-index: 9999;
            "
        >
            ⬅ Home
        </a>
        <h2>EPUB ➜ TXT</h2>
        <div class="lang-wrapper">
            <label class="lang-label" data-i18n="lang.option"></label>

            <select onchange="setLang(this.value)">
                <option value="vi-vn">🇻🇳 Tiếng Việt</option>
                <option value="en-us">🇺🇸 English</option>
                <option value="ja-jp">🇯🇵 日本語</option>
                <option value="ko-kr">🇰🇷 한국어</option>
                <option value="zh-cn">🇨🇳 简体中文</option>
                <option value="zh-tw">🇹🇼 繁體中文</option>
                <option value="th-th">🇹🇭 ไทย</option>
                <option value="id-id">🇮🇩 Indonesia</option>
                <option value="de-de">🇩🇪 Deutsch</option>
                <option value="fr-fr">🇫🇷 Français</option>
                <option value="es-es">🇪🇸 Español</option>
                <option value="la">🏛️Latina</option>
            </select>
        </div>
        <input type="file" id="file" accept=".epub" />
        <br />
        <button
            id="download"
            style="display: none"
            data-i18n="download.txt"
        ></button>
        <textarea id="output"></textarea>
        <noscript>
            <div
                style="text-align: center; color: red; margin: 20px 0"
                data-i18n="noscript.tools"
            ></div>
        </noscript>
        <input type="radio" name="ver" onclick="switchVersion('v1')" /> V1(MDT
        Style)
        <input type="radio" name="ver" onclick="switchVersion('v2')" />
        V2(Reading TXT Style)
        <script src="asciiBox.js"></script>
        <script id="converter-script">
            const SCRIPT_MAP = {
                v1: "converter.js",
                v2: "converter-v2.js",
            };
            function loadSavedVersion() {
                let version = localStorage.getItem("converterVersion");

                if (!version) {
                    version = "v1";
                    localStorage.setItem("converterVersion", version);
                }

                loadScript(version);
            }
            function loadScript(version) {
                const old = document.getElementById("converter-script");
                if (old) old.remove();

                const script = document.createElement("script");
                script.id = "converter-script";
                script.src = SCRIPT_MAP[version];

                script.onload = () => {
                    console.log("Loaded:", version);
                };

                document.body.appendChild(script);
            }
            function switchVersion(version) {
                localStorage.setItem("converterVersion", version);
                location.reload();
            }
            document.addEventListener("DOMContentLoaded", () => {
                loadSavedVersion();
            });
        </script>
        <script src="../i18n-2.js"></script>
    </body>
</html>
