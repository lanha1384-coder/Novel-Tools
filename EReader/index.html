<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title data-i18n="library.page_title">Thư viện Sách ePub Cục Bộ</title>
        <style>
            :root {
                --primary: #4a90e2;
                --bg: #f5f7fa;
                --card-bg: #ffffff;
            }
            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background-color: var(--var-bg, #f5f7fa);
                margin: 0;
                padding: 20px;
            }
            .container {
                max-width: 1000px;
                margin: 0 auto;
            }
            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 30px;
            }
            h1 {
                color: #333;
                margin: 0;
            }

            .upload-btn-wrapper {
                position: relative;
                overflow: hidden;
                display: inline-block;
            }
            .btn-upload {
                border: 2px dashed var(--primary);
                color: var(--primary);
                background-color: white;
                padding: 10px 20px;
                border-radius: 8px;
                font-weight: bold;
                cursor: pointer;
            }
            .upload-btn-wrapper input[type="file"] {
                font-size: 100px;
                position: absolute;
                left: 0;
                top: 0;
                opacity: 0;
                cursor: pointer;
            }

            .grid-library {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 25px;
            }
            .book-card {
                background: var(--card-bg);
                border-radius: 10px;
                padding: 15px;
                text-align: center;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
                cursor: pointer;
                transition:
                    transform 0.2s,
                    box-shadow 0.2s;
                position: relative;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }
            .book-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            }
            .book-cover {
                width: 100%;
                height: 200px;
                object-fit: cover;
                border-radius: 6px;
                background-color: #eaeaea;
                margin-bottom: 10px;
            }
            .book-title {
                font-size: 14px;
                font-weight: 600;
                color: #333;
                margin: 8px 0 4px 0;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .book-author {
                font-size: 12px;
                color: #777;
                margin: 0 0 10px 0;
            }

            .btn-delete {
                position: absolute;
                top: 5px;
                right: 5px;
                background: rgba(255, 0, 0, 0.7);
                color: white;
                border: none;
                border-radius: 50%;
                width: 24px;
                height: 24px;
                cursor: pointer;
                display: none;
            }
            .book-card:hover .btn-delete {
                display: block;
            }
            .lang-wrapper {
                position: fixed;
                top: 1px;
                right: 180px;

                display: flex;
                flex-direction: column;
                gap: 6px;

                padding: 5px 12px;
                border-radius: 12px;

                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);

                color: white;
                font-family: system-ui, sans-serif;
                z-index: 11;
                background: radial-gradient(circle at top, #1a1a2e, #0f0f0f);
            }

            .lang-label {
                font-size: 12px;
                opacity: 0.7;
                z-index: 15;
            }

            .lang-select {
                background: rgba(0, 0, 0, 0.4);
                color: white;

                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 8px;

                padding: 6px 10px;

                outline: none;
                cursor: pointer;

                transition: 0.2s;
                z-index: 11;
            }

            .lang-select:hover {
                border-color: rgba(0, 255, 255, 0.5);
                box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
                z-index: 12;
            }

            .lang-select option {
                background: #111;
                color: white;
                z-index: 12;
            }
        </style>
        <script src="epub.min.js"></script>
    </head>
    <body>
        <div class="container">
            <div class="lang-wrapper">
                <label class="lang-label" data-i18n="lang.option"></label>

                <select onchange="setLang(this.value)">
                    <option value="vi-vn">🇻🇳 Tiếng Việt</option>
                    <option value="en-us">🇺🇸 English</option>
                    <option value="ja-jp">🇯🇵 日本語</option>
                    <option value="ko-kr">🇰🇷 한국어</option>
                    <option value="zh-cn">🇨🇳 简体中文</option>
                    <option value="zh-tw">🇹🇼 繁體中文</option>
                    <option value="th-th">🇹🇭 ไทย</option>
                    <option value="id-id">🇮🇩 Indonesia</option>
                    <option value="de-de">🇩🇪 Deutsch</option>
                    <option value="fr-fr">🇫🇷 Français</option>
                    <option value="es-es">🇪🇸 Español</option>
                    <option value="la">🏛️Latina</option>
                </select>
            </div>
            <a
                href="../index.html"
                onclick="sessionStorage.setItem('reloaded_once', '1')"
                style="
                    position: fixed;
                    top: 15px;
                    left: 15px;
                    padding: 10px 14px;
                    background: rgba(0, 0, 0, 0.6);
                    color: white;
                    text-decoration: none;
                    border-radius: 10px;
                    border: 1px solid rgba(255, 255, 255, 0.2);
                    backdrop-filter: blur(6px);
                    z-index: 11;
                "
            >
                ⬅ Home
            </a>
            <header>
                <h1 data-i18n="library.heading">Kệ Sách Của Tôi</h1>
                <div class="upload-btn-wrapper">
                    <button class="btn-upload" data-i18n="library.btn_add">
                        + Thêm sách EPUB mới
                    </button>
                    <input type="file" id="library-file-input" accept=".epub" />
                </div>
            </header>

            <div class="grid-library" id="library-grid"></div>
        </div>
        <script src="../i18n-2.js"></script>
        <script>
            const DB_NAME = "EpubReaderLocalDB";
            const DB_VERSION = 1;
            const STORE_NAME = "bookshelf";

            function applyTranslations() {
                document.querySelectorAll("[data-i18n]").forEach((el) => {
                    const key = el.getAttribute("data-i18n");
                    if (typeof t === "function") {
                        el.innerText = t(key);
                    }
                });
            }

            function openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME, { keyPath: "id" });
                        }
                    };
                });
            }

            async function saveBookToStorage(bookData) {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, "readwrite");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.put(bookData);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            async function getAllBooksFromStorage() {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, "readonly");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async function deleteBookFromStorage(id) {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, "readwrite");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.delete(id);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            document
                .getElementById("library-file-input")
                .addEventListener("change", handleImportEpub);

            async function handleImportEpub(e) {
                const file = e.target.files[0];
                if (!file) return;

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const zip = await JSZip.loadAsync(arrayBuffer);

                    const containerXmlStr = await zip
                        .file("META-INF/container.xml")
                        .async("string");
                    const parser = new DOMParser();
                    const containerDoc = parser.parseFromString(
                        containerXmlStr,
                        "text/xml",
                    );
                    const opfPath = containerDoc
                        .querySelector("rootfile")
                        .getAttribute("full-path");
                    const opfStr = await zip.file(opfPath).async("string");
                    const opfDoc = parser.parseFromString(opfStr, "text/xml");

                    const title =
                        opfDoc.querySelector("title")?.textContent ||
                        file.name.replace(".epub", "");

                    const author =
                        opfDoc.querySelector("creator")?.textContent ||
                        t("library.unknown_author");

                    const bookId =
                        crypto.randomUUID?.() ||
                        title + Date.now() + Math.random();

                    let coverBlobUrl = "";
                    const coverMeta =
                        opfDoc.querySelector('meta[name="cover"]');
                    let coverHref = null;
                    if (coverMeta) {
                        const coverId = coverMeta.getAttribute("content");
                        coverHref = opfDoc
                            .querySelector(`manifest > item[id="${coverId}"]`)
                            ?.getAttribute("href");
                    }

                    let coverBlob = null;
                    if (coverHref) {
                        let basePath = opfPath.includes("/")
                            ? opfPath.substring(0, opfPath.lastIndexOf("/")) +
                              "/"
                            : "";
                        let fullCoverPath = basePath + coverHref;
                        const coverFile =
                            zip.file(fullCoverPath) || zip.file(coverHref);
                        if (coverFile)
                            coverBlob = await coverFile.async("blob");
                    }

                    const bookRecord = {
                        id: bookId,
                        title: title,
                        author: author,
                        fileBlob: file,
                        coverBlob: coverBlob,
                        addedAt: Date.now(),
                    };

                    await saveBookToStorage(bookRecord);
                    renderLibraryGrid();
                } catch (err) {
                    alert(t("library.error_import") + err.message);
                    console.log(err.message);
                }
            }
            function renderEmptyState() {
                const grid = document.getElementById("library-grid");

                grid.innerHTML = `
                    <p style="grid-column: 1/-1; text-align:center; color:#999; padding: 40px 0;">
                        ${t("library.empty_state")}
                    </p>
                `;
            }
            let renderToken = 0;
            async function renderLibraryGrid() {
                const token = ++renderToken;
                const grid = document.getElementById("library-grid");
                grid.innerHTML = "";
                const books = await getAllBooksFromStorage();
                if (token !== renderToken) return;
                if (books.length === 0) {
                    renderEmptyState();
                    return;
                }

                books.forEach((book) => {
                    const card = document.createElement("div");
                    card.className = "book-card";

                    let coverSrc = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='140' viewBox='0 0 100 140'><rect width='100' height='140' fill='%23ccc'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='12' fill='%23666'>${t("library.no_cover")}</text></svg>`;
                    if (book.coverBlob) {
                        coverSrc = URL.createObjectURL(book.coverBlob);
                    }

                    card.innerHTML = `
                        <button class="btn-delete" onclick="event.stopPropagation(); askDeleteBook('${book.id}')">✕</button>
                        <img class="book-cover" src="${coverSrc}" alt="Cover">
                        <div class="book-title">${book.title}</div>
                        <div class="book-author">${book.author}</div>
                    `;

                    card.onclick = () => openBookInReader(book.id);
                    grid.appendChild(card);
                });
            }

            async function askDeleteBook(id) {
                if (confirm(t("library.confirm_delete"))) {
                    await deleteBookFromStorage(id);
                    renderLibraryGrid();
                }
            }

            function openBookInReader(bookId) {
                localStorage.setItem("selected_local_book_id", bookId);
                window.location.href = "EReader.html";
            }
            onI18nChange(() => {
                applyI18n();
                renderLibraryGrid();
            });
            window.addEventListener("DOMContentLoaded", () => {
                applyI18n();
                renderLibraryGrid();
            });
        </script>
    </body>
</html>
