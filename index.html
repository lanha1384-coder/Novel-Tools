<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title data-i18n="app.title">TruyenChuTool by TzhouSensei</title>

        <style>
            body {
                margin: 0;
                font-family: system-ui, sans-serif;
                background: radial-gradient(circle at top, #1a1a2e, #0f0f0f);
                color: white;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                overflow: hidden;
            }

            h1 {
                font-size: 42px;
                margin-bottom: 10px;
                background: linear-gradient(90deg, #00f5ff, #a855f7, #ff4ecd);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                animation: glow 3s infinite alternate;
            }

            p {
                opacity: 0.7;
                margin-bottom: 40px;
            }

            .container {
                display: flex;
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .card {
                width: 220px;
                padding: 20px;
                border-radius: 16px;
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                text-align: center;
                cursor: pointer;
                transition: 0.3s;
                text-decoration: none;
                color: white;
            }

            .card:hover {
                transform: translateY(-8px) scale(1.05);
                background: rgba(255, 255, 255, 0.1);
                box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            }

            .icon {
                font-size: 40px;
                margin-bottom: 10px;
            }

            @keyframes glow {
                from {
                    filter: drop-shadow(0 0 5px #00f5ff);
                }
                to {
                    filter: drop-shadow(0 0 20px #a855f7);
                }
            }
            .lang-wrapper {
                position: fixed;
                top: 20px;
                right: 20px;

                display: flex;
                flex-direction: column;
                gap: 6px;

                padding: 10px 12px;
                border-radius: 12px;

                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);

                color: white;
                font-family: system-ui, sans-serif;
            }

            .lang-label {
                font-size: 12px;
                opacity: 0.7;
            }

            .lang-select {
                background: rgba(0, 0, 0, 0.4);
                color: white;

                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 8px;

                padding: 6px 10px;

                outline: none;
                cursor: pointer;

                transition: 0.2s;
            }

            .lang-select:hover {
                border-color: rgba(0, 255, 255, 0.5);
                box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            }

            .lang-select option {
                background: #111;
                color: white;
            }
        </style>
    </head>

    <body>
        <h1 data-i18n="home.title"></h1>
        <p data-i18n="home.subtitle"></p>
        <div class="lang-wrapper">
            <label class="lang-label" data-i18n="lang.option"></label>

            <select onchange="setLang(this.value)">
                <option value="vi-vn">🇻🇳 Tiếng Việt</option>
                <option value="en-us">🇺🇸 English</option>
                <option value="ja-jp">🇯🇵 日本語</option>
                <option value="ko-kr">🇰🇷 한국어</option>
                <option value="zh-cn">🇨🇳 简体中文</option>
                <option value="zh-tw">🇹🇼 繁體中文</option>
                <option value="th-th">🇹🇭 ไทย</option>
                <option value="id-id">🇮🇩 Indonesia</option>
                <option value="de-de">🇩🇪 Deutsch</option>
                <option value="fr-fr">🇫🇷 Français</option>
                <option value="es-es">🇪🇸 Español</option>
                <option value="la">🏛️Latina</option>
            </select>
        </div>
        <div class="container">
            <a class="card" href="MDT/MDT.html">
                <div class="icon">📖</div>
                <h3 data-i18n="tool.reader.title"></h3>
                <p data-i18n="tool.reader.desc"></p>
            </a>

            <a class="card" href="EReader/index.html">
                <div class="icon">📖</div>
                <h3 data-i18n="tool.epub.reader"></h3>
                <p data-i18n="tool.epub.reader.desc"></p>
            </a>

            <a class="card" href="MDT/MDT-Editor.html">
                <div class="icon">✍️</div>
                <h3 data-i18n="tool.editor.title"></h3>
                <p data-i18n="tool.editor.desc"></p>
            </a>

            <a class="card" href="Converter/ToolConvert.html">
                <div class="icon">🔁</div>
                <h3 data-i18n="tool.converter.title"></h3>
                <p data-i18n="tool.converter.desc"></p>
            </a>
        </div>
        <noscript>
            <div
                style="text-align: center; color: red; margin: 20px 0"
                data-i18n="noscript.mdt"
            ></div>
        </noscript>
        <script src="i18n.js"></script>
    </body>
</html>
